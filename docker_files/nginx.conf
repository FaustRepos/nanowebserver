server {
    listen 80;
    server_name ${DOMAIN};
    root /var/www;
    index index.php index.html;

    location / {
        try_files $uri $uri/ @rewrites;
    }

    location @rewrites {
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
